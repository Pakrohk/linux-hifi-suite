# RNNoise Noise Cancellation — PipeWire filter chain
# Requires: noise-suppression-for-voice (Arch) or ladspa-noise-suppression-for-voice (Fedora)
# Plugin path: /usr/lib/ladspa/librnnoise_ladspa.so (or /usr/lib64 on 64-bit)

context.modules = [
    { name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "RNNoise"
            media.name       = "RNNoise"
            filter.graph = {
                nodes = [
                    { type = ladspa
                      name = rnnoise
                      plugin = "<RNNOISE_PLUGIN>"
                      label  = noise_suppressor_mono
                      control = {
                          "VAD Threshold (%)"          = 75.0
                          "VAD Grace Period (ms)"      = 200
                          "Retroactive VAD Grace (ms)" = 0
                      }
                    }
                ]
            }
            audio.rate = 48000
            capture.props = {
                node.name   = "capture.rnnoise_source"
                node.passive = true
            }
            playback.props = {
                node.name    = "output.rnnoise_source"
                media.class  = Audio/Source
            }
        }
    }
]
