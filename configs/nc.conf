// HiFi Suite — Noise Cancelling Virtual Microphone
// Select "Noise Cancelling Mic" as your input source. Done.
// Requires: noise-suppression-for-voice (RNNoise LADSPA plugin)

context.modules = [
    { name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "Noise Cancelling Mic"
            media.name       = "Noise Cancelling Mic"
            filter.graph = {
                nodes = [
                    { type = ladspa
                      name = rnnoise
                      plugin = "<RNNOISE_PLUGIN>"
                      label  = noise_suppressor_mono
                      control = {
                          "VAD Threshold (%)"          = 50.0
                          "VAD Grace Period (ms)"      = 200
                          "Retroactive VAD Grace (ms)" = 0
                      }
                    }
                ]
            }
            audio.rate = 48000
            capture.props = {
                node.name    = "capture.hifi_rnnoise"
                node.passive = true
                audio.rate   = 48000
            }
            playback.props = {
                node.name    = "hifi_rnnoise_source"
                media.class  = Audio/Source
                audio.rate   = 48000
                node.description = "Noise Cancelling Mic"
            }
        }
    }
]
