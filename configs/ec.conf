# Echo Cancellation — PipeWire module
# For speakers or open-back headphones that leak audio
# Set SOURCE_NODE and SINK_NODE to your actual device names
# Find them: wpctl status

context.modules = [
    { name = libpipewire-module-echo-cancel
        flags = [ nofail ]
        args = {
            monitor.mode = true
            capture.props = {
                node.target = "<MIC_NODE>"
                node.passive = true
            }
            sink.props = {
                node.target = "<OUTPUT_NODE>"
            }
            source.props = {
                node.name   = "output.ec_source"
                node.description = "Echo Cancelling"
            }
        }
    }
]
